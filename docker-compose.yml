services:

  nextjs:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    env_file: .env.docker
    environment:
      - NODE_ENV=development
      - WATCHPACK_POLLING=true
    depends_on:
      - postgres

  postgres:
    image: postgres:15
    container_name: prisma_demo_db
    env_file: .env.docker
    ports:
      - "5432:5432"
    volumes:
      - prisma_demo_db_data:/var/lib/postgresql/data

volumes:
  prisma_demo_db_data: